spring:
  application:
    name: orchestrator
  datasource:
    url: jdbc:postgresql://localhost:5432/orchestration
    username: orchestrator
    password: orchestrator
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  otlp:
    tracing:
      endpoint: http://localhost:4318/v1/traces
