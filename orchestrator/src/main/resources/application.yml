spring:
  application:
    name: orchestrator
  datasource:
    url: jdbc:postgresql://localhost:5432/orchestration
    username: orchestrator
    password: orchestrator
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true

orchestration:
  worker:
    host: localhost
    grpc-port: 9090
  dispatch:
    max-retries: 5
    retry-scan-interval-ms: 1000
    in-flight-lease-seconds: 120
  compensation:
    max-retries: 5
    recovery-interval-ms: 60000

resilience4j:
  circuitbreaker:
    instances:
      worker:
        registerHealthIndicator: true
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 10s
        failureRateThreshold: 50

management:
  metrics:
    distribution:
      percentiles-histogram:
        "[orchestration.task.execution]": true
        "[orchestration.compensation.execution]": true
  health:
    circuitbreakers:
      enabled: true
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
