# Scrape Spring Boot Actuator Prometheus endpoint when the orchestrator runs on the host.
# Prometheus UI on host: http://localhost:9099 (see docker-compose port mapping).
# Default scrape target assumes orchestrator actuator on host port 8080.
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: orchestrator
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - host.docker.internal:8080
